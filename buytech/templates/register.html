{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="bt-auth-bg d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-lg rounded-4 p-4">

                    <!-- Logo -->
                    <div class="text-center mb-4">
                        <a href="{{ url_for('home') }}" class="text-decoration-none">
                            <h3 class="fw-800 bt-brand">
                                <i class="bi bi-lightning-charge-fill text-primary"></i> BuyTech
                            </h3>
                        </a>
                        <p class="text-muted small mt-1">Create your free account</p>
                    </div>

                    <form method="POST" action="{{ url_for('register') }}">

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label class="form-label fw-600 small">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-person-badge text-muted"></i>
                                </span>
                                <input type="text" name="name" class="form-control border-start-0 ps-0"
                                       placeholder="John Doe" required />
                            </div>
                        </div>

                        <!-- Username -->
                        <div class="mb-3">
                            <label class="form-label fw-600 small">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-at text-muted"></i>
                                </span>
                                <input type="text" name="username" class="form-control border-start-0 ps-0"
                                       placeholder="e.g. johndoe99" required minlength="3"
                                       pattern="[a-zA-Z0-9_]+" title="Letters, numbers, and underscores only" />
                            </div>
                            <div class="form-text">Letters, numbers, and underscores only.</div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label fw-600 small">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock text-muted"></i>
                                </span>
                                <input type="password" name="password"
                                       class="form-control border-start-0 ps-0"
                                       placeholder="Min. 6 characters" required minlength="6" />
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label class="form-label fw-600 small">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock-fill text-muted"></i>
                                </span>
                                <input type="password" name="confirm_password"
                                       class="form-control border-start-0 ps-0"
                                       placeholder="Repeat password" required />
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-600">
                            Create Account <i class="bi bi-person-plus ms-1"></i>
                        </button>
                    </form>

                    <hr class="my-4">

                    <p class="text-center text-muted small mb-0">
                        Already have an account?
                        <a href="{{ url_for('login') }}" class="fw-600 text-primary">Sign In</a>
                    </p>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
