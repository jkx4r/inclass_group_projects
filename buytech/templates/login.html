{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="bt-auth-bg d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card border-0 shadow-lg rounded-4 p-4">

                    <!-- Logo -->
                    <div class="text-center mb-4">
                        <a href="{{ url_for('home') }}" class="text-decoration-none">
                            <h3 class="fw-800 bt-brand">
                                <i class="bi bi-lightning-charge-fill text-primary"></i> BuyTech
                            </h3>
                        </a>
                        <p class="text-muted small mt-1">Sign in to your account</p>
                    </div>

                    <form method="POST" action="{{ url_for('login') }}">
                        <!-- Username -->
                        <div class="mb-3">
                            <label class="form-label fw-600 small">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-person text-muted"></i>
                                </span>
                                <input type="text" name="username" class="form-control border-start-0 ps-0"
                                       placeholder="your username" required autocomplete="username" />
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-4">
                            <label class="form-label fw-600 small">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock text-muted"></i>
                                </span>
                                <input type="password" name="password" id="passwordInput"
                                       class="form-control border-start-0 border-end-0 ps-0"
                                       placeholder="••••••••" required />
                                <button type="button" class="input-group-text bg-light border-start-0"
                                        onclick="togglePassword()">
                                    <i class="bi bi-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-600">
                            Sign In <i class="bi bi-arrow-right ms-1"></i>
                        </button>
                    </form>

                    <hr class="my-4">

                    <p class="text-center text-muted small mb-0">
                        Don't have an account?
                        <a href="{{ url_for('register') }}" class="fw-600 text-primary">Sign Up</a>
                    </p>

                </div>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
{% endblock %}
{% endblock %}
